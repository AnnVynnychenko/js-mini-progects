<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilterFlow</title>
    <link rel="stylesheet" href="../../base.css" />
    <link rel="stylesheet" href="./style-filter.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 class="project-name">FilterFlow</h1>
      </header>
      <main>
        <section class="presets-section">
          <span>Load Test Presets:</span>
          <button class="preset-btn" type="button" data-preset="include">
            Filter & Sort
          </button>
          <button class="preset-btn" type="button" data-preset="exclude-or">
            Exclude OR
          </button>
          <button class="preset-btn" type="button" data-preset="exclude-and">
            Exclude AND
          </button>
        </section>
        <form class="filter-form">
          <label>
            Input JSON (Data & Conditions)
            <textarea
              id="json-input"
              class="panel-textarea"
              name="jsonInput"
              placeholder="Click any button above to display the data."
            ></textarea>
          </label>
          <label>
            Resulting JSON (Output)
            <textarea
              id="json-output"
              class="panel-textarea"
              readonly
              placeholder="Processed results will appear here..."
            ></textarea>
          </label>
          <button type="submit" class="process-btn">Process Data</button>
          <label class="panel-label">
            Filtering and Sorting Conditions
            <textarea
              id="conditions"
              name="jsonCondition"
              placeholder="Click any button above to display the data."
            ></textarea>
          </label>
        </form>
      </main>
    </div>
    <script type="module" src="./app-filter.js"></script>
  </body>
</html>
