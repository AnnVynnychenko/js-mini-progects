<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilterFlow</title>
    <link rel="stylesheet" href="../../base.css" />
    <link rel="stylesheet" href="./style-filter.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 class="project-name">FilterFlow</h1>
      </header>
      <main>
        <section class="presets-section">
          <span class="btn-labels">Load Users' Data:</span>
          <button
            class="preset-btn load-data"
            type="button"
            data-preset="user-data"
          >
            Load Test Preset
          </button>
          <span class="btn-labels">Load Conditions Presets:</span>
          <button class="preset-btn" type="button" data-preset="include">
            Include
          </button>
          <button class="preset-btn" type="button" data-preset="exclude-or">
            Exclude OR
          </button>
          <button class="preset-btn" type="button" data-preset="exclude-and">
            Exclude AND
          </button>
          <button class="preset-btn" type="button" data-preset="sort">
            Sort
          </button>
        </section>
        <form class="filter-form">
          <label class="field-name">
            Users' Data JSON
            <textarea
              id="json-input"
              class="panel-textarea"
              name="jsonInput"
              placeholder="Click a button above to display the data."
            ></textarea>
          </label>
          <label class="field-name">
            Filtering and Sorting Conditions JSON
            <textarea
              id="conditions"
              class="panel-textarea"
              name="jsonCondition"
              placeholder="Click a button above to display the conditions."
            ></textarea>
          </label>
          <label class="field-name panel-label">
            Resulting JSON
            <textarea
              id="json-output"
              class="panel-textarea"
              readonly
              placeholder="Processed results will appear here..."
            ></textarea>
          </label>
          <div class="actions-wrapper">
            <button type="submit" class="process-btn">Process Data</button>
            <button type="button" id="reset-btn" class="reset-btn">
              Reset All
            </button>
          </div>
        </form>
      </main>
    </div>
    <script type="module" src="./app-filter.js"></script>
  </body>
</html>
